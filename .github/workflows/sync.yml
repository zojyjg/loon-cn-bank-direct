name: Sync bank rules

on:
  schedule:
    - cron: '15 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/sync-rules.mjs
      - name: Commit updated subscription
        run: |
          if git diff --quiet -- BankDirect.list; then
            echo 'No upstream changes.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add BankDirect.list
          git commit -m 'sync: update bank rules'
          git push
